# PCaSAM-3D-ProFound Stage 2 V4: data-optimized prompt refinement
# Changes vs V2: use preprocessed intensities without second z-score, train with gland-aware hard negatives,
# and apply gland-mask postprocessing during validation/threshold sweeps for FP suppression.
# Run after Stage 1 V4 has produced its best coarse checkpoint.

project:
  name: pcasam3d_profound
  seed: 42
  device: cuda
data:
  processed_root: ../picai_preprocessing_project/data/processed/picai_profound_prompt_v2
  train_split: data/splits/5fold/fold_0/train.txt
  val_split: data/splits/5fold/fold_0/val.txt
  patch_size:
  - 128
  - 128
  - 128
  use_lesion_aware_sampling: true
  pos_patch_ratio: 0.78
  positive_case_ratio: 0.72
  normalize: preprocessed
  batch_size: 1
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  max_train_cases: null
  max_val_cases: null
  augmentation:
    enabled: true
    random_flip_prob: 0.5
    random_flip_axes:
    - 0
    - 1
    - 2
    intensity_shift_range: 0.06
    intensity_scale_range: 0.06
    gaussian_noise_std: 0.012
  gland_aware_negative_sampling: true
  gland_negative_prob: 0.85
model:
  name: pcasam3d_profound
  profound_checkpoint_path: ../ProFound/checkpoint/checkpoint-799 1.pth
  profound_repo_path: ../ProFound
  profound_model_import_path: models.convnextv2:convnextv2_tiny
  profound_model_kwargs:
    in_chans: 3
    drop_path_rate: 0.1
  profound_checkpoint_format: profound_convnextv2_pretrain
  freeze_encoder: true
  unfreeze_last_n_stages: null
  encoder_channels:
  - 96
  - 192
  - 384
  - 768
  use_lesion_aware_enhancement: true
  use_modality_aware_fusion: true
  modality_fusion_hidden_channels: 16
  modality_fusion_residual_scale: 0.1
  modality_dropout:
    prob: 0.1
    probs:
    - 0.14
    - 0.04
    - 0.14
    keep_at_least: 2
  modality_gate_prior:
  - 0.45
  - 0.62
  - 0.45
  sam_checkpoint_path: /opt/data/private/lm/project-segmentation-for-MIR/SAM-Med3D/ckpt/sam_med3d_turbo.pth
  sam_embed_dim: 384
  sam_image_size: 128
  freeze_sam_decoder: true
  bridge_use_stage2: true
  bridge_norm: layer
  use_modality_cross_attention: true
  cross_attn_num_heads: 6
  cross_attn_reduction: 4
  coarse_hidden_dim: 64
  use_high_res_refinement: true
  high_res_refinement_hidden_dim: 32
  high_res_refinement_scale: 0.5
  coarse_threshold: 0.15
  max_proposals: 5
  min_component_voxels: 20
  point_type: centroid
  no_prompt_if_empty: true
  no_prompt_threshold: 0.02
  use_box_prompts: true
  box_margin_voxels: 6
  soft_box_std_scale: 2.0
  training_point_mode: topk_peaks
  training_nms_kernel: 9
  train_hard_prompt_prob: 0.4
  training_use_soft_box: false
  use_objectness_gate: false
  objectness_threshold: 0.2
  prompt_dropout:
    enabled: true
    drop_point_prob: 0.18
    drop_box_prob: 0.12
    drop_mask_prob: 0.02
  zoom_margin_voxels: 8
  zoom_min_size_voxels: 24
  use_mask_prior: true
  return_dict: true
  freeze_prompt_encoder: true
  freeze_mask_decoder: true
loss:
  refined_dice_weight: 1.0
  refined_focal_tversky_weight: 0.8
  refined_bce_weight: 0.25
  refined_tversky_fn_weight: 0.6
  refined_tversky_fp_weight: 0.4
  refined_focal_gamma: 1.333
  refined_bce_pos_weight: 2.4
  coarse_dice_weight: 1.0
  coarse_focal_tversky_weight: 0.8
  coarse_tversky_fn_weight: 0.7
  coarse_tversky_fp_weight: 0.3
  coarse_focal_gamma: 1.333
  coarse_bce_weight: 0.25
  coarse_bce_pos_weight: 4.0
  coarse_aux_weight: 0.2
  refined_weight: 1.0
  coarse_weight: 0.0
  iou_weight: 0.0
  objectness_weight: 0.0
  objectness_pos_weight: 1.0
  use_iou_loss: false
  refined_boundary_bce_weight: 0.08
  refined_boundary_weight: 3.0
  boundary_kernel_size: 3
optimizer:
  name: AdamW
  encoder_lr: 0.0
  bridge_lr: 2.0e-05
  decoder_lr: 0.0
  weight_decay: 0.0003
scheduler:
  name: cosine
  min_lr: 1.0e-07
prompt_curriculum:
  enabled: true
  # Slower GT-prompt annealing stabilizes refinement before switching to fully automatic prompts.
  gt_prompt_epochs: 8
  anneal_epochs: 24
  gt_prompt_prob: 1.0
  min_gt_prompt_prob: 0.3
  max_gt_points: 3
  max_gt_negative_points: 1
  jitter_std: 0.06
  box_margin_voxels: 6
  box_jitter_std: 0.07
  use_gt_mask_prior: false
training:
  epochs: 75
  amp: true
  grad_clip_norm: 8.0
  save_every: 5
  validate_every: 1
  stage: prompt
  resume_from: outputs/pcasam3d_stage1_coarse_v4_data_opt/fold_0/checkpoints/best_by_val_threshold_sweep_coarse_score.pth
selection:
  min_recall: 0.6
early_stopping:
  enabled: true
  monitor: val_refined_sweep_best_score
  mode: max
  patience: 18
  min_delta: 0.0004
metrics:
  threshold: 0.75
  coarse_threshold: 0.15
  min_pred_component_size: 10
  refined_threshold_sweep:
  - 0.25
  - 0.35
  - 0.45
  - 0.55
  - 0.65
  - 0.75
  - 0.8
  - 0.85
  refined_score:
    positive_dice_weight: 1.15
    global_dice_weight: 0.25
    lesion_recall_weight: 0.3
    positive_precision_weight: 0.15
    fp_components_penalty: 0.04
    target_lesion_recall: 0.86
    below_target_recall_penalty: 1.6
    target_positive_precision: 0.4
    below_target_precision_penalty: 0.15
    max_fp_components_per_case: 1.3
    above_target_fp_penalty: 0.035
  coarse_threshold_sweep: []
  coarse_score:
    lesion_recall_weight: 1.0
    positive_dice_weight: 0.35
    fp_components_penalty: 0.04
    target_lesion_recall: 0.9
    below_target_recall_penalty: 1.5
  gland_mask_postprocess:
    enabled: true
    margin_voxels: 3
    outside_logit: -12.0
    min_mask_value: 0.5
logging:
  experiment_name: pcasam3d_stage2_precision_fp_v4_data_opt
  output_root: outputs
