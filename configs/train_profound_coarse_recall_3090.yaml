project:
  name: profound_coarse_seg
  seed: 42
  device: cuda
  cudnn_benchmark: true
  float32_matmul_precision: high
data:
  processed_root: ../picai_preprocessing_project/data/processed/picai_profound_prompt_v2
  train_split: data/splits/train.txt
  val_split: data/splits/val.txt
  test_split: data/splits/test.txt
  num_workers: 8
  batch_size: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  train_patch_size:
  - 64
  - 128
  - 128
  use_lesion_aware_sampling: true
  pos_patch_ratio: 0.85
  neg_patch_ratio: 0.15
  positive_case_ratio: 0.8
  max_train_cases: null
  max_val_cases: null
model:
  name: profound_coarse
  checkpoint_path: ../ProFound/checkpoint/checkpoint-799 1.pth
  profound_repo_path: ../ProFound
  profound_model_import_path: models.convnextv2:convnextv2_tiny
  freeze_encoder: true
  strict_load: false
  profound_checkpoint_format: profound_convnextv2_pretrain
  profound_model_kwargs:
    in_chans: 3
    drop_path_rate: 0.1
  return_multi_scale_features: true
  encoder_channels:
  - 96
  - 192
  - 384
  - 768
  use_lesion_aware_enhancement: true
  use_modality_aware_fusion: true
  modality_fusion_hidden_channels: 16
  modality_fusion_residual_scale: 0.1
  decoder_channels:
  - 256
  - 128
  - 64
  - 32
  out_channels: 1
  return_aux: false
  unfreeze_after_epoch: null
  unfreeze_last_n_stages: null
loss:
  name: dice_focal_tversky_bce
  dice_weight: 0.5
  focal_tversky_weight: 1.0
  bce_weight: 0.3
  tversky_fn_weight: 0.7
  tversky_fp_weight: 0.3
  focal_gamma: 1.3333333333
  bce_pos_weight: 3.0
optimizer:
  name: AdamW
  encoder_lr: 1.0e-05
  head_lr: 0.0001
  weight_decay: 0.0001
scheduler:
  name: cosine
  min_lr: 1.0e-06
  monitor: coarse_score
training:
  epochs: 80
  amp: true
  grad_clip_norm: 12.0
  validate_every: 1
  save_every: 10
  checkpoint_monitors:
  - metric: coarse_score
    filename: best_by_val_coarse_score.pth
    mode: max
  - metric: threshold_sweep_best_coarse_score
    filename: best_by_val_threshold_sweep_coarse_score.pth
    mode: max
  - metric: lesion_recall
    filename: best_by_val_lesion_recall.pth
    mode: max
  - metric: positive_case_dice
    filename: best_by_val_positive_case_dice.pth
    mode: max
  - metric: dice
    filename: best_by_val_dice.pth
    mode: max
  resume_from: null
inference:
  use_sliding_window: true
  roi_size:
  - 64
  - 128
  - 128
  sw_batch_size: 4
  overlap: 0.25
  segmentation_threshold: 0.5
  prompt_generation_threshold: 0.15
metrics:
  threshold: 0.3
  compute_lesion_recall: true
  qualified_lesion_recall:
    min_precision: 0.05
    min_positive_case_dice: 0.05
  min_pred_component_size: 2
logging:
  experiment_name: coarse_score_es_3090
  output_root: outputs
  tensorboard: true
  save_csv_log: true
  main_metrics:
  - loss
  - dice
  - precision
  - recall
  - positive_case_dice
  - lesion_recall
  - fp_per_case
  - coarse_score
  - best_threshold_by_coarse_score
  - threshold_sweep_best_coarse_score
early_stopping:
  enabled: true
  monitor: val_coarse_score
  mode: max
  patience: 10
  min_delta: 0.0005
coarse_score:
  enabled: true
  lesion_recall_weight: 0.7
  positive_case_dice_weight: 0.3
  fp_penalty_weight: 0.03
  fp_free_margin: 1.0
  use_precision_penalty: true
  precision_floor: 0.1
  precision_penalty_weight: 1.0
  qualified_min_precision: 0.05
  qualified_min_positive_case_dice: 0.05
threshold_sweep:
  enabled: true
  thresholds:
  - 0.1
  - 0.15
  - 0.2
  - 0.25
  - 0.3
  - 0.4
  - 0.5
